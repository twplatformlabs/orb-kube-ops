---
version: 2.1

orbs:
  kube: twdps/kube-ops@dev:<<pipeline.git.revision>>
  op: twdps/onepassword@3.0.0

globals:
  - &context orb-publishing
  - &kubeconfig platform/sbx-i01-aws-us-east-1/kubeconfig-base64

jobs:

  test general commands:
    docker:
      - image: ghcr.io/twplatformlabs/circleci-eks-ops:alpine-latest
    steps:
      - checkout
      - kube/op-kubeconfig:
          op-value: *kubeconfig
      - op/env
      - run:
          name: confirm op-config results
          command: cat ~/.kube/config | grep "clusters:"
      - run:
          name: generate unique file to test write-to-github
          command: |
            uuid=$(date +%s%N)
            echo "$uuid" > check.uuid
            echo "WRITEUUID=${uuid}" >> $BASH_ENV
      - kube/write-to-github:
          source: check.uuid
          destination: .
          repository-url: twplatformlabs/static
          branch: master
      - run:
          name: confirm write-to-github results
          command: |
            curl -O https://raw.githubusercontent.com/twplatformlabs/static/main/check.uuid
            contents=$(cat check.uuid)
            if [ "$contents" != "$WRITEUUID" ]; then
              echo "write-to-github failed"
              exit 1
            fi

  test package install:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - kube/install:
          use-sudo: "true"
          kubectl-version: 1.30.1
          kind-version: 0.23.0
          awscli-version: 1.32.25
          istio-version: 1.22.0
          argocd-version: 3.3.7
          flux-version: 2.3.0
          helm-version: 3.15.0
          circlepipe-version: 0.3.2
          px-version: 0.8.2
          terraform-version: 1.11.0
          awspec-version: 1.36.0
          checkov-version: 3.2.28
          trivy-version: 0.70.0
          karmada-version: 1.17.2
      - kube/install:
          bats-version: 1.11.0
      - run:
          name: confirm installed version
          command: |
            set -exo pipefail
            kubectl version --client=true | grep '1.30.1'
            aws --version | grep '1.32.25'
            istioctl version --short --remote=false | grep '1.22.0'
            argocd version --client | grep '3.3.7'
            flux version --client | grep '2.3.0'
            helm version --short | grep '3.15.0'
            circlepipe version | grep '0.3.2'
            px version | grep '0.8.2'
            terraform version | grep '1.11.0'
            bats --version | grep '1.11.0'
            awspec --version | grep '1.36.0'
            checkov --version | grep '3.2.28'
            trivy version | grep '0.70.0'
            karmadactl version | grep '1.17.2'

workflows:

  integration tests:
    jobs:
      - test package install
      - test general commands:
          context: *context
