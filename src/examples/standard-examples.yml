# src/examples/command-examples.yml
# yamllint disable rule:line-length
---
description: Standard workflow demonstrating orb command features.

usage:
  version: 2.1

  orbs:
    kube: twdps/kube-ops@1.0.0
    op: twdps/onepassword@3.0.0

  on-push-main: &on-push-main
    branches:
      only: /main/
    tags:
      ignore: /.*/

  jobs:
    common commands:
      machine:
        image: ubuntu-2204:current
      resource_class: medium
      steps:
        - checkout
        - kube/install:                         # install specific package version 
            kind-version: 0.23.0
            awscli-version: 1.32.25
            istio-version: 1.22.0
        - kube/op-kubeconfig:                    # setup kubeconfig from sa config stored as base64 in 1password vault
            op-value: path/to/kubeconfig-base64
        - kube/gcloud-kubeconfig:                # setup kubeconfig for service account GKE access
            cluster-name: my-cluster
            project-id: 0123456789
            region: us-central1
            impersonate-service-account: my-service-account@my-project.iam.gserviceaccount.com
        - kube/cis-benchmark:
            benchmark: aws

  workflows:
    version: 2

    workflow-example:
      jobs:
        - common commands

